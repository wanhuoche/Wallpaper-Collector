<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 · 壁纸收集器</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🖼</text></svg>">
    <link rel="stylesheet" href="style.css">
    <script src="js/theme.js"></script>
</head>
<body class="auth-body">

    <div class="auth-bg" id="authBg"></div>

    <div class="auth-container">
        <a href="index.html" class="auth-back">← 返回首页</a>

        <div class="auth-card">
            <div class="auth-logo">🖼</div>
            <h1 class="auth-title">创建账号</h1>
            <p class="auth-subtitle">注册后即可跨设备同步收藏壁纸和设置</p>

            <form class="auth-form" id="registerForm" novalidate autocomplete="on">
                <div class="auth-field">
                    <label class="auth-label" for="username">用户名</label>
                    <input
                        type="text"
                        class="auth-input"
                        id="username"
                        name="username"
                        placeholder="给自己取个名字"
                        autocomplete="username"
                        maxlength="20"
                        required
                    />
                </div>

                <div class="auth-field">
                    <label class="auth-label" for="email">邮箱</label>
                    <input
                        type="email"
                        class="auth-input"
                        id="email"
                        name="email"
                        placeholder="your@email.com"
                        autocomplete="email"
                        required
                    />
                </div>

                <div class="auth-field">
                    <label class="auth-label" for="password">密码</label>
                    <input
                        type="password"
                        class="auth-input"
                        id="password"
                        name="password"
                        placeholder="6-12 位"
                        autocomplete="new-password"
                        minlength="6"
                        required
                    />
                </div>

                <p class="auth-error" id="registerError"></p>

                <button type="submit" class="btn-auth" id="btnRegister">
                    <span class="btn-auth-text">注 册</span>
                    <span class="btn-auth-spinner" style="display:none;"></span>
                </button>
            </form>

            <p class="auth-switch">
                已有账号？<a href="login.html">去登录 →</a>
            </p>
        </div>

        <p class="auth-footer">
            注册即表示你的数据将安全存储在我们的服务器上
        </p>
    </div>

    <script src="js/auth.js"></script>
    <script>
        (function() {
            var W = window.WallpaperApp;

            document.querySelector('#authBg').style.backgroundImage =
                'url(https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1920&q=80)';

            W.auth.handleFormSubmit(document.querySelector('#registerForm'), function(fields) {
                return W.auth.register(fields.username, fields.email, fields.password);
            });
        })();
    </script>
</body>
</html>
